# Run OpsTwin locally with: docker compose up --build
# Then visit http://localhost:3000

services:
  opstwin:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: opstwin
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      DATABASE_URL: "file:/app/prisma/dev.db"
      DB_PATH: "/app/prisma/dev.db"
      NEXTAUTH_SECRET: "opstwin-local-secret"
      NEXTAUTH_URL: "http://localhost:3000"
    volumes:
      # Persist the SQLite database and Prisma schema via bind mount
      - ./prisma:/app/prisma
      # Persist .ops data directory
      - ./.ops:/app/.ops
    restart: unless-stopped
