<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>OpsTwin Architecture</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0c10; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; padding: 32px; font-family: 'IBM Plex Mono', 'Courier New', monospace; }
</style>
</head>
<body>
<svg viewBox="0 0 900 720" width="900" height="720" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:0.15"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="720" fill="#0a0c10"/>
  
  <!-- Title -->
  <text x="32" y="40" fill="#e2e8f0" font-size="20" font-weight="800" letter-spacing="-0.5">OpsTwin</text>
  <text x="130" y="40" fill="#64748b" font-size="14">— Architecture Overview</text>

  <!-- ── CURSOR (bottom) ── -->
  <rect x="260" y="600" width="380" height="80" rx="8" fill="#0f1218" stroke="#2a3545" stroke-width="1.5"/>
  <rect x="260" y="600" width="380" height="4" rx="2" fill="#8b5cf6"/>
  <text x="450" y="625" fill="#8b5cf6" font-size="11" font-weight="700" text-anchor="middle" letter-spacing="0.08em">CURSOR AI AGENT</text>
  <text x="450" y="645" fill="#64748b" font-size="10" text-anchor="middle">Reads: .cursor/rules.mdc · .cursor/skills.md</text>
  <text x="450" y="660" fill="#64748b" font-size="10" text-anchor="middle">Writes: .ops/runs/&lt;id&gt;/last_run.json</text>
  <text x="450" y="675" fill="#334155" font-size="10" text-anchor="middle">Your IDE / codebase</text>

  <!-- ── AUDIT JSON ── -->
  <rect x="340" y="510" width="220" height="60" rx="6" fill="#0f1218" stroke="#1e3a1e" stroke-width="1.5"/>
  <text x="450" y="533" fill="#10b981" font-size="11" font-weight="700" text-anchor="middle">last_run.json</text>
  <text x="450" y="550" fill="#64748b" font-size="9.5" text-anchor="middle">files_changed · files_skipped</text>
  <text x="450" y="563" fill="#64748b" font-size="9.5" text-anchor="middle">todos · tests · decision_trace</text>

  <!-- Arrow: Cursor → Audit JSON -->
  <line x1="450" y1="600" x2="450" y2="572" stroke="#8b5cf6" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="446,572 454,572 450,562" fill="#8b5cf6"/>

  <!-- ── API LAYER ── -->
  <rect x="60" y="370" width="780" height="100" rx="8" fill="#0f1218" stroke="#1e2530" stroke-width="1.5"/>
  <rect x="60" y="370" width="780" height="4" rx="2" fill="#00d4ff"/>
  <text x="450" y="393" fill="#00d4ff" font-size="11" font-weight="700" text-anchor="middle" letter-spacing="0.08em">NEXT.JS API ROUTES</text>
  
  <!-- API boxes -->
  <rect x="80" y="404" width="160" height="50" rx="5" fill="#0d1a24" stroke="#00d4ff33"/>
  <text x="160" y="424" fill="#e2e8f0" font-size="10" font-weight="600" text-anchor="middle">/api/tasks</text>
  <text x="160" y="440" fill="#64748b" font-size="9" text-anchor="middle">CRUD task management</text>
  <text x="160" y="452" fill="#64748b" font-size="9" text-anchor="middle">zod validation</text>

  <rect x="260" y="404" width="160" height="50" rx="5" fill="#0d1a24" stroke="#00d4ff33"/>
  <text x="340" y="424" fill="#e2e8f0" font-size="10" font-weight="600" text-anchor="middle">/api/runs</text>
  <text x="340" y="440" fill="#64748b" font-size="9" text-anchor="middle">Start · upload_audit</text>
  <text x="340" y="452" fill="#64748b" font-size="9" text-anchor="middle">mismatch compute</text>

  <rect x="440" y="404" width="160" height="50" rx="5" fill="#0d1a24" stroke="#00d4ff33"/>
  <text x="520" y="424" fill="#e2e8f0" font-size="10" font-weight="600" text-anchor="middle">/api/memory</text>
  <text x="520" y="440" fill="#64748b" font-size="9" text-anchor="middle">pattern match · suggest</text>
  <text x="520" y="452" fill="#64748b" font-size="9" text-anchor="middle">outcome recording</text>

  <rect x="620" y="404" width="200" height="50" rx="5" fill="#0d1a24" stroke="#00d4ff33"/>
  <text x="720" y="424" fill="#e2e8f0" font-size="10" font-weight="600" text-anchor="middle">/api/outcomes</text>
  <text x="720" y="440" fill="#64748b" font-size="9" text-anchor="middle">accept · reject · rerun</text>
  <text x="720" y="452" fill="#64748b" font-size="9" text-anchor="middle">acceptance rate metrics</text>

  <!-- Arrow: Audit JSON → API -->
  <line x1="450" y1="510" x2="450" y2="472" stroke="#10b981" stroke-width="1.5"/>
  <polygon points="446,472 454,472 450,462" fill="#10b981"/>
  <text x="480" y="493" fill="#10b981" font-size="9">POST upload_audit</text>

  <!-- ── DATA LAYER ── -->
  <rect x="60" y="240" width="500" height="100" rx="8" fill="#0f1218" stroke="#1e2530" stroke-width="1.5"/>
  <rect x="60" y="240" width="500" height="4" rx="2" fill="#3b82f6"/>
  <text x="310" y="263" fill="#3b82f6" font-size="11" font-weight="700" text-anchor="middle" letter-spacing="0.08em">PRISMA ORM + SQLITE / POSTGRES</text>
  
  <text x="80" y="286" fill="#94a3b8" font-size="9.5">tasks</text>
  <text x="140" y="286" fill="#94a3b8" font-size="9.5">cursor_runs</text>
  <text x="225" y="286" fill="#94a3b8" font-size="9.5">file_edits</text>
  <text x="295" y="286" fill="#94a3b8" font-size="9.5">inspected_files</text>
  <text x="80" y="305" fill="#94a3b8" font-size="9.5">expectations</text>
  <text x="160" y="305" fill="#94a3b8" font-size="9.5">outcomes</text>
  <text x="230" y="305" fill="#94a3b8" font-size="9.5">memory_entries</text>
  <text x="340" y="286" fill="#334155" font-size="9.5">↑ local SQLite</text>
  <text x="340" y="305" fill="#334155" font-size="9.5">↑ Neon/PlanetScale prod</text>
  
  <!-- Arrow: API → Data -->
  <line x1="310" y1="370" x2="310" y2="342" stroke="#3b82f6" stroke-width="1.5"/>
  <polygon points="306,342 314,342 310,332" fill="#3b82f6"/>

  <!-- ── MEMORY ENGINE ── -->
  <rect x="590" y="240" width="250" height="100" rx="8" fill="#0f1218" stroke="#8b5cf644" stroke-width="1.5"/>
  <rect x="590" y="240" width="250" height="4" rx="2" fill="#8b5cf6"/>
  <text x="715" y="263" fill="#8b5cf6" font-size="11" font-weight="700" text-anchor="middle" letter-spacing="0.05em">MEMORY ENGINE</text>
  <text x="715" y="284" fill="#64748b" font-size="9.5" text-anchor="middle">Pattern hash clustering</text>
  <text x="715" y="299" fill="#64748b" font-size="9.5" text-anchor="middle">Success rate tracking per type</text>
  <text x="715" y="314" fill="#64748b" font-size="9.5" text-anchor="middle">Fix suggestion ranking</text>
  <text x="715" y="329" fill="#64748b" font-size="9.5" text-anchor="middle">Focused rerun prompt gen</text>

  <!-- Arrow: API → Memory Engine -->
  <line x1="630" y1="370" x2="680" y2="342" stroke="#8b5cf6" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="676,342 684,342 682,332" fill="#8b5cf6"/>

  <!-- ── UI ── -->
  <rect x="60" y="80" width="780" height="120" rx="8" fill="url(#accentGrad)" stroke="#00d4ff44" stroke-width="1.5"/>
  <rect x="60" y="80" width="780" height="4" rx="2" fill="#00d4ff"/>
  <text x="450" y="103" fill="#00d4ff" font-size="11" font-weight="700" text-anchor="middle" letter-spacing="0.08em">OPSTWIN UI — Next.js / React</text>
  
  <!-- UI Screens -->
  <rect x="80" y="114" width="170" height="72" rx="5" fill="#0a0c10" stroke="#1e2530"/>
  <text x="165" y="133" fill="#e2e8f0" font-size="10" font-weight="600" text-anchor="middle">Dashboard</text>
  <text x="165" y="149" fill="#64748b" font-size="9" text-anchor="middle">Task list · status badges</text>
  <text x="165" y="163" fill="#64748b" font-size="9" text-anchor="middle">Acceptance rate metrics</text>
  <text x="165" y="177" fill="#64748b" font-size="9" text-anchor="middle">Click to open audit</text>

  <rect x="265" y="114" width="170" height="72" rx="5" fill="#0a0c10" stroke="#1e2530"/>
  <text x="350" y="133" fill="#e2e8f0" font-size="10" font-weight="600" text-anchor="middle">Audit Report</text>
  <text x="350" y="149" fill="#64748b" font-size="9" text-anchor="middle">Changed · Skipped · Tests</text>
  <text x="350" y="163" fill="#64748b" font-size="9" text-anchor="middle">Decision trace · Blockers</text>
  <text x="350" y="177" fill="#64748b" font-size="9" text-anchor="middle">Accept / Reject / Rerun</text>

  <rect x="450" y="114" width="170" height="72" rx="5" fill="#0a0c10" stroke="#1e2530"/>
  <text x="535" y="133" fill="#e2e8f0" font-size="10" font-weight="600" text-anchor="middle">Live Run Viewer</text>
  <text x="535" y="149" fill="#64748b" font-size="9" text-anchor="middle">Streaming file edits</text>
  <text x="535" y="163" fill="#64748b" font-size="9" text-anchor="middle">Inline diffs · Untouched</text>
  <text x="535" y="177" fill="#64748b" font-size="9" text-anchor="middle">Quick revert per file</text>

  <rect x="635" y="114" width="185" height="72" rx="5" fill="#0a0c10" stroke="#1e2530"/>
  <text x="727" y="133" fill="#e2e8f0" font-size="10" font-weight="600" text-anchor="middle">Memory &amp; Patterns</text>
  <text x="727" y="149" fill="#64748b" font-size="9" text-anchor="middle">Failure clusters</text>
  <text x="727" y="163" fill="#64748b" font-size="9" text-anchor="middle">Success rate heatmap</text>
  <text x="727" y="177" fill="#64748b" font-size="9" text-anchor="middle">Auto-suggest safer plan</text>

  <!-- Arrow: UI ↔ API -->
  <line x1="450" y1="200" x2="450" y2="368" stroke="#00d4ff44" stroke-width="1.5"/>
  <polygon points="446,368 454,368 450,358" fill="#00d4ff"/>
  <polygon points="446,202 454,202 450,212" fill="#00d4ff"/>

  <!-- Vercel badge -->
  <rect x="760" y="35" width="80" height="22" rx="4" fill="#1a1a2e" stroke="#3b82f6" stroke-width="1"/>
  <text x="800" y="50" fill="#3b82f6" font-size="9" font-weight="700" text-anchor="middle">▲ VERCEL</text>

  <!-- GitHub badge -->
  <rect x="670" y="35" width="80" height="22" rx="4" fill="#1a1a2e" stroke="#8b5cf6" stroke-width="1"/>
  <text x="710" y="50" fill="#8b5cf6" font-size="9" font-weight="700" text-anchor="middle">⊙ GITHUB</text>

</svg>
